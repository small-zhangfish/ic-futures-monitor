name: IC期货基差抓取

on:
  schedule:
    - cron: '30 7 * * 1-5'  # 每天早上7:30运行（对应北京时间15:30）
  push:
    branches: [ main ]

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
