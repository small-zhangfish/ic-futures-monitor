name: IC Futures Data Crawler

on:
  schedule:
    - cron: '45 15 * * 1-5'  # 周一到周五 15:45 运行
  push:
    branches: [ main ]

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas matplotlib python-dateutil
      
      - name: Run crawler
        run: python get_stata.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
